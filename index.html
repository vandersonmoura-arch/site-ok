<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vanderson Alves | Landing Page</title>
  <link rel="stylesheet" href="css/style.css">
<body>

    <main class="container">
      <section id="hero">
    <div class="hero-content">
        <img id="display-foto" src="" alt="Foto de Perfil" class="profile-pic">
        <div class="hero-text">
            <h1 id="display-nome">Carregando...</h1>
            <p id="display-frase" class="tagline"></p>
        </div>
    </div>
</section>

        <section id="about">
            <h2>Sobre Mim</h2>
            <p id="display-sobre"></p>
        </section>

        <section id="services">
            <h2>O que eu faço</h2>
            <ul>
                <li>Otimização de processos com IA</li>
                <li>Desenvolvimento de soluções eficientes</li>
                <li>Consultoria tecnológica</li>
            </ul>
        </section>

        <footer id="contact">
            <h2>Contato</h2>
            <p>Email: vandersonmoura@icloud.com</p>
            <a href="admin.html" class="admin-link">Acessar Painel</a>
        </footer>
    </main>

    <script type="module">
        // Importamos a função que busca os dados do LocalStorage
        import { getProjectData } from './js/data.js';

        // Executamos a função
        const dados = getProjectData();

        // Injetamos os dados nos elementos HTML através dos IDs
        document.getElementById('display-nome').innerText = dados.nome;
        document.getElementById('display-frase').innerText = dados.frase;
        document.getElementById('display-sobre').innerText = dados.sobre;
        document.getElementById('display-foto').src = dados.foto;
    </script>
</body>
</html>
